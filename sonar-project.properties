sonar.projectKey=bug-report-portal
sonar.projectName=Bug Report Portal
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=**/node_modules/**,**/uploads/**,**/data/**,**/prisma/migrations/**,.git/**,**/dist/**,**/build/**,**/coverage/**,**/tests/**,printReports.js,prisma/**,views/**,public/**

# Tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Coverage (LCOV produced by Jest with --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=tests/**,printReports.js,prisma/**,views/**,public/**,seed-demo.js

sonar.sourceEncoding=UTF-8
