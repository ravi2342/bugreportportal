apiVersion: apps/v1
kind: Deployment
metadata:
  name: bug-report-portal-app
  namespace: bug-report-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bug-report-portal-app
  template:
    metadata:
      labels:
        app: bug-report-portal-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d bugreportportal; do
                echo "Waiting for postgres to be ready..."
                sleep 2
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bug-report-portal-secrets
                  key: POSTGRES_USER
      containers:
        - name: app
          image: bug-report-portal:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: bug-report-portal-config
            - secretRef:
                name: bug-report-portal-secrets
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: uploads
          emptyDir: {}
